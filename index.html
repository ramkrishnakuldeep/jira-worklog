<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jira Daily Worklog</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #0f1117;
      --surface: #181c26;
      --surface2: #1e2332;
      --border: #2a2f3e;
      --accent: #4f8ef7;
      --accent-dim: rgba(79,142,247,0.12);
      --success: #34d399;
      --success-dim: rgba(52,211,153,0.12);
      --warning: #fbbf24;
      --warning-dim: rgba(251,191,36,0.12);
      --muted: #6b7280;
      --text: #e5e7eb;
      --text-soft: #9ca3af;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
      --radius: 10px;
      --radius-sm: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-logo {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .header-sub {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: 1px;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px 6px;
    }

    .date-nav button {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }
    .date-nav button:hover { background: var(--border); color: var(--text); }

    #date-display {
      font-size: 13px;
      font-family: var(--mono);
      color: var(--text);
      min-width: 100px;
      text-align: center;
    }

    .btn {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost { background: var(--surface2); color: var(--text-soft); border: 1px solid var(--border); }

    /* ── Setup screen ── */
    #setup-screen {
      max-width: 480px;
      margin: 80px auto;
      padding: 0 20px;
    }

    .setup-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .setup-icon {
      font-size: 32px;
      margin-bottom: 16px;
    }

    .setup-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .setup-desc {
      font-size: 14px;
      color: var(--text-soft);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-soft);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); }

    .setup-help {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    .setup-help a { color: var(--accent); text-decoration: none; }

    /* ── Main layout ── */
    #main-screen { display: none; }

    .content {
      max-width: 780px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 600;
      font-family: var(--mono);
      color: var(--text);
      line-height: 1;
    }

    .stat-value.accent { color: var(--accent); }

    /* ── Issue cards ── */
    .issue-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .issue-card.in-progress { border-left: 3px solid var(--warning); }
    .issue-card.done { border-left: 3px solid var(--success); }

    .issue-header {
      padding: 16px 18px 0;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
    }

    .issue-key {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .issue-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
      min-width: 200px;
      padding-top: 1px;
    }

    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .badge-done { background: var(--success-dim); color: var(--success); }
    .badge-progress { background: var(--warning-dim); color: var(--warning); }
    .badge-project {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .issue-meta {
      padding: 8px 18px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0 0;
    }

    .worklogs { padding: 0 18px 16px; }

    .worklog-entry {
      border-left: 2px solid var(--border);
      padding: 10px 0 10px 14px;
      margin-top: 12px;
    }

    .worklog-entry:first-child { margin-top: 0; }

    .worklog-time-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .worklog-time {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
    }

    .worklog-spent {
      font-size: 12px;
      font-weight: 500;
      font-family: var(--mono);
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 1px 8px;
      border-radius: 4px;
    }

    .worklog-items {
      list-style: none;
      padding: 0;
    }

    .worklog-items li {
      font-size: 13px;
      color: var(--text-soft);
      line-height: 1.6;
      padding-left: 12px;
      position: relative;
    }

    .worklog-items li::before {
      content: '·';
      position: absolute;
      left: 0;
      color: var(--muted);
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 500; color: var(--text-soft); margin-bottom: 6px; }
    .empty-desc { font-size: 13px; line-height: 1.6; }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    .error-card {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius);
      padding: 16px 18px;
      font-size: 13px;
      color: #f87171;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .logout-btn {
      font-size: 12px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--sans);
      padding: 0;
      text-decoration: underline;
    }
    .logout-btn:hover { color: var(--text); }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .header { padding: 12px 16px; }
      .content { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="header-logo">📋</div>
  <div>
    <div class="header-title">Daily Worklog</div>
    <div class="header-sub" id="workspace-name">photonfuture.atlassian.net</div>
  </div>
  <div class="header-right">
    <div class="date-nav">
      <button onclick="changeDate(-1)" title="Previous day">‹</button>
      <span id="date-display">—</span>
      <button onclick="changeDate(1)" title="Next day">›</button>
    </div>
    <button class="btn btn-primary" onclick="fetchWorklogs()">↻ Refresh</button>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>
</div>

<!-- ── Setup screen ── -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-icon">🔐</div>
    <div class="setup-title">Connect to Jira</div>
    <div class="setup-desc">Enter your Jira credentials to view your daily worklog. Your token is stored only in your browser's local storage.</div>

    <div id="setup-error" class="error-card" style="display:none;"></div>

    <div class="field">
      <label>Jira Domain</label>
      <input type="text" id="domain" placeholder="yourcompany.atlassian.net" />
      <div class="setup-help">Your Jira Cloud URL without https://</div>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@company.com" />
    </div>

    <div class="field">
      <label>API Token</label>
      <input type="password" id="token" placeholder="••••••••••••••••" />
      <div class="setup-help">
        Generate at <a href="https://id.atlassian.com/manage-profile/security/api-tokens" target="_blank">id.atlassian.com → API tokens</a>
      </div>
    </div>

    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;" onclick="connect()">
      Connect →
    </button>
  </div>
</div>

<!-- ── Main screen ── -->
<div id="main-screen">
  <div class="content">
    <div id="error-banner" class="error-card" style="display:none;"></div>
    <div id="dashboard"></div>
  </div>
</div>

<script>
  // ── State ──
  let currentDate = new Date();
  let config = null;

  // ── Init ──
  window.onload = () => {
    const saved = localStorage.getItem('jira_config');
    if (saved) {
      config = JSON.parse(saved);
      showMain();
    }
    updateDateDisplay();
  };

  function updateDateDisplay() {
    const d = currentDate;
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('date-display').textContent =
      `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
  }

  function changeDate(delta) {
    currentDate.setDate(currentDate.getDate() + delta);
    updateDateDisplay();
    if (config) fetchWorklogs();
  }

  function dateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function formatTime(isoStr) {
    if (!isoStr) return '—';
    const d = new Date(isoStr);
    return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }

  function formatSpent(seconds) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    if (h && m) return `${h}h ${m}m`;
    if (h) return `${h}h`;
    return `${m}m`;
  }

  function extractText(adfContent) {
    if (!adfContent || !adfContent.content) return [];
    const items = [];
    function walk(nodes) {
      for (const node of nodes) {
        if (node.type === 'text') items.push(node.text);
        if (node.content) walk(node.content);
      }
    }
    walk(adfContent.content);
    return items.filter(t => t.trim());
  }

  // ── Auth ──
  async function connect() {
    const domain = document.getElementById('domain').value.trim().replace(/^https?:\/\//, '');
    const email = document.getElementById('email').value.trim();
    const token = document.getElementById('token').value.trim();
    const errEl = document.getElementById('setup-error');
    errEl.style.display = 'none';

    if (!domain || !email || !token) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.style.display = 'block';
      return;
    }

    config = { domain, email, token };

    // Test connection
    try {
      const res = await jiraGet('/rest/api/3/myself');
      if (!res.ok) throw new Error(`Auth failed (${res.status})`);
      localStorage.setItem('jira_config', JSON.stringify(config));
      showMain();
    } catch (e) {
      errEl.textContent = `Connection failed: ${e.message}. Check your domain, email, and API token.`;
      errEl.style.display = 'block';
      config = null;
    }
  }

  function logout() {
    localStorage.removeItem('jira_config');
    config = null;
    document.getElementById('setup-screen').style.display = 'block';
    document.getElementById('main-screen').style.display = 'none';
  }

  function showMain() {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    document.getElementById('workspace-name').textContent = config.domain;
    fetchWorklogs();
  }

  // ── API ──
  const PROXY = 'https://jira-proxy.kuldeipbhimte.workers.dev/';

  async function jiraGet(path) {
    const creds = btoa(`${config.email}:${config.token}`);
    const proxyUrl = `${PROXY}?domain=${encodeURIComponent(config.domain)}&path=${encodeURIComponent(path)}`;
    return fetch(proxyUrl, {
      headers: {
        'Authorization': `Basic ${creds}`,
        'Accept': 'application/json'
      }
    });
  }

  async function fetchWorklogs() {
    const dashboard = document.getElementById('dashboard');
    const errorBanner = document.getElementById('error-banner');
    errorBanner.style.display = 'none';

    dashboard.innerHTML = `
      <div class="loading">
        <div class="spinner"></div><br>
        Fetching worklogs for ${dateStr(currentDate)}…
      </div>`;

    try {
      const ds = dateStr(currentDate);
      const jql = encodeURIComponent(`worklogDate = "${ds}" AND worklogAuthor = currentUser() ORDER BY updated DESC`);
      const res = await jiraGet(`/rest/api/3/search/jql?jql=${jql}&fields=summary,status,project,worklog,timespent,issuetype&maxResults=50`);

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.errorMessages?.join(', ') || `Error ${res.status}`);
      }

      const data = await res.json();
      renderDashboard(data.issues || [], ds);

    } catch (e) {
      errorBanner.textContent = `Failed to load: ${e.message}`;
      errorBanner.style.display = 'block';
      dashboard.innerHTML = '';
    }
  }

  // ── Render ──
  function renderDashboard(issues, ds) {
    const dashboard = document.getElementById('dashboard');

    if (!issues.length) {
      dashboard.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-title">No worklogs for ${ds}</div>
          <div class="empty-desc">You haven't logged any time on this date yet.<br>Use the arrows to check another day.</div>
        </div>`;
      return;
    }

    // Compute stats — only count worklogs for the selected date
    let totalSeconds = 0;
    let totalEntries = 0;
    let completedCount = 0;

    issues.forEach(issue => {
      const worklogs = (issue.fields.worklog?.worklogs || []).filter(w => {
        return w.started?.startsWith(ds) || w.created?.startsWith(ds);
      });
      worklogs.forEach(w => { totalSeconds += w.timeSpentSeconds || 0; });
      totalEntries += worklogs.length;
      if (issue.fields.status?.statusCategory?.key === 'done') completedCount++;
    });

    const statsHtml = `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Time logged</div>
          <div class="stat-value accent">${formatSpent(totalSeconds)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Issues</div>
          <div class="stat-value">${issues.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Log entries</div>
          <div class="stat-value">${totalEntries}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Completed</div>
          <div class="stat-value">${completedCount} / ${issues.length}</div>
        </div>
      </div>`;

    const cardsHtml = issues.map(issue => {
      const f = issue.fields;
      const status = f.status?.statusCategory?.key;
      const statusName = f.status?.name || '—';
      const isDone = status === 'done';

      // Filter worklogs to only today's
      const worklogs = (f.worklog?.worklogs || []).filter(w =>
        (w.started || w.created || '').startsWith(ds)
      );

      const worklogsHtml = worklogs.map(w => {
        const items = extractText(w.comment);
        const itemsHtml = items.length
          ? `<ul class="worklog-items">${items.map(i => `<li>${i}</li>`).join('')}</ul>`
          : '';
        return `
          <div class="worklog-entry">
            <div class="worklog-time-row">
              <span class="worklog-time">${formatTime(w.started)}</span>
              <span class="worklog-spent">${w.timeSpent || formatSpent(w.timeSpentSeconds)}</span>
            </div>
            ${itemsHtml}
          </div>`;
      }).join('');

      return `
        <div class="issue-card ${isDone ? 'done' : 'in-progress'}">
          <div class="issue-header">
            <span class="issue-key">${issue.key}</span>
            <span class="issue-title">${f.summary}</span>
          </div>
          <div class="issue-meta">
            <span class="badge ${isDone ? 'badge-done' : 'badge-progress'}">${statusName}</span>
            <span class="badge badge-project">${f.project?.name || '—'}</span>
          </div>
          <hr class="divider" />
          <div class="worklogs">${worklogsHtml || '<div style="padding:12px 0;font-size:13px;color:var(--muted);">No worklog entries for this date.</div>'}</div>
        </div>`;
    }).join('');

    dashboard.innerHTML = statsHtml + cardsHtml;
  }
</script>
</body>
</html>
